<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<title>MarketAI - 식품 할인</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --lotte:#e31837; --coupang:#ff6000; --ssg:#cc0000; --kurly:#5f0080;
  --emart:#c89b00; --traders:#0065BD; --costco:#005DAA; --homeplus:#0066CC;
  --everyday:#FF6B35; --lotteon:#E40028; --toss:#0064FF; --eleven:#FF0033; --naver:#03C75A;
  --emart_flyer:#c89b00; --lotte_flyer:#e31837;
  --bg:#0f0f1a; --surface:#1a1a2e; --card:#22223a; --border:#2d2d50;
  --text:#f0f0f0; --muted:#7a7a9a; --radius:16px;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; min-height:100vh; padding-bottom:32px; }

/* Header */
.header { background:var(--surface); padding:14px 16px 10px; position:sticky; top:0; z-index:200; border-bottom:1px solid var(--border); }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.logo { font-size:18px; font-weight:900; background:linear-gradient(90deg,#a78bfa,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.count { font-size:11px; color:var(--muted); }

/* Search */
.search-wrap { position:relative; }
.search-input { width:100%; background:#2d2d50; border:1.5px solid var(--border); border-radius:24px; padding:9px 40px 9px 38px; font-size:14px; color:var(--text); outline:none; transition:border-color .2s; }
.search-input:focus { border-color:#a78bfa; }
.search-input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; }
.search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:var(--muted); border:none; border-radius:50%; width:18px; height:18px; color:#0f0f1a; font-size:11px; cursor:pointer; display:none; align-items:center; justify-content:center; font-weight:800; }
.search-clear.show { display:flex; }

/* Tabs */
.tabs-wrap { background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:90px; z-index:100; }
.tabs { display:flex; gap:6px; padding:8px 12px; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex-shrink:0; padding:6px 12px; border-radius:20px; border:1.5px solid var(--border); background:transparent; color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; white-space:nowrap; }
.tab.active { color:#fff; border-color:transparent; }
.tab[data-p="all"].active    { background:linear-gradient(135deg,#a78bfa,#60a5fa); }
.tab[data-p="lotte"].active  { background:var(--lotte); }
.tab[data-p="coupang"].active{ background:var(--coupang); }
.tab[data-p="ssg"].active    { background:var(--ssg); }
.tab[data-p="kurly"].active  { background:var(--kurly); }
.tab[data-p="emart"].active  { background:var(--emart); color:#111; }
.tab[data-p="traders"].active{ background:var(--traders); }
.tab[data-p="costco"].active { background:var(--costco); }
.tab[data-p="homeplus"].active{ background:var(--homeplus); }
.tab[data-p="everyday"].active{ background:var(--everyday); }
.tab[data-p="lotteon"].active{ background:var(--lotteon); }
.tab[data-p="toss"].active   { background:var(--toss); }
.tab[data-p="eleven"].active { background:var(--eleven); }
.tab[data-p="naver"].active      { background:var(--naver); }
.tab[data-p="emart_flyer"].active{ background:var(--emart); color:#111; }
.tab[data-p="lotte_flyer"].active{ background:var(--lotte); }

/* Grid */
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 10px; max-width:640px; margin:0 auto; }
/* Flyer banner — strip at top of product grid linking to full flyer image */
.flyer-banner { display:flex; align-items:center; justify-content:space-between;
  margin:10px 10px 0; padding:11px 16px; border-radius:10px;
  background:linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.09); text-decoration:none; color:inherit; }
.flyer-banner-label { font-size:12px; color:var(--muted); }
.flyer-banner-cta { font-size:12px; font-weight:700; color:#a78bfa;
  background:rgba(167,139,250,.12); padding:5px 12px; border-radius:20px;
  white-space:nowrap; }

/* Card */
.card { background:var(--card); border-radius:var(--radius); overflow:hidden; display:block; text-decoration:none; color:inherit; transition:transform .15s, box-shadow .15s; }
.card:active { transform:scale(0.96); }

/* Image area */
.card-img { width:100%; aspect-ratio:1/1; position:relative; overflow:hidden; }
.card-img img { width:100%; height:100%; object-fit:cover; transition:opacity .3s; }
.card-img img.loading { opacity:0; }
.img-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:42px; }
/* Flyer page images — portrait aspect ratio (leaflet pages are taller than wide) */
.flyer-page-img { width:100%; aspect-ratio:2/3; position:relative; overflow:hidden; }
.flyer-page-img img { width:100%; height:100%; object-fit:cover; transition:opacity .3s; }
.flyer-page-img img.loading { opacity:0; }

.disc-badge { position:absolute; top:8px; left:8px; background:rgba(231,76,60,.9); color:#fff; font-size:11px; font-weight:800; padding:3px 7px; border-radius:6px; backdrop-filter:blur(2px); z-index:1; }
.extra-badge { position:absolute; top:8px; right:8px; background:rgba(0,0,0,.6); color:#fff; font-size:9px; font-weight:700; padding:2px 6px; border-radius:5px; backdrop-filter:blur(4px); z-index:1; white-space:nowrap; max-width:60px; overflow:hidden; text-overflow:ellipsis; }

/* Body */
.card-body { padding:9px 10px 11px; }
.ptag { display:inline-block; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px; margin-bottom:4px; }
.ptag-lotte    { background:rgba(227,24,55,.15);  color:#ff6b80; }
.ptag-coupang  { background:rgba(255,96,0,.15);   color:#ff9955; }
.ptag-ssg      { background:rgba(204,0,0,.15);    color:#ff5555; }
.ptag-kurly    { background:rgba(95,0,128,.2);    color:#c77dff; }
.ptag-emart    { background:rgba(200,155,0,.2);   color:#f5c842; }
.ptag-traders  { background:rgba(0,101,189,.2);   color:#66b2ff; }
.ptag-costco   { background:rgba(0,93,170,.2);    color:#55aaff; }
.ptag-homeplus { background:rgba(0,102,204,.2);   color:#66bbff; }
.ptag-everyday { background:rgba(255,107,53,.15); color:#ff9977; }
.ptag-lotteon  { background:rgba(228,0,40,.15);   color:#ff6677; }
.ptag-toss     { background:rgba(0,100,255,.15);  color:#6699ff; }
.ptag-eleven   { background:rgba(255,0,51,.15);   color:#ff6688; }
.ptag-naver       { background:rgba(3,199,90,.15);   color:#33dd88; }
.ptag-emart_flyer { background:rgba(200,155,0,.2);   color:#f5c842; }
.ptag-lotte_flyer { background:rgba(227,24,55,.15);  color:#ff6b80; }

.card-title { font-size:11.5px; line-height:1.45; color:#ddd; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:7px; }
.price-row { display:flex; align-items:baseline; gap:4px; }
.sale-price { font-size:15px; font-weight:800; color:#fff; }
.orig-price { font-size:10px; color:var(--muted); text-decoration:line-through; }

/* BG gradients */
.bg-lotte    { background:linear-gradient(135deg,#8b0a1a,#e31837); }
.bg-coupang  { background:linear-gradient(135deg,#a03000,#ff6000); }
.bg-ssg      { background:linear-gradient(135deg,#800000,#cc0000); }
.bg-kurly    { background:linear-gradient(135deg,#3a0050,#5f0080); }
.bg-emart    { background:linear-gradient(135deg,#7a5e00,#c89b00); }
.bg-traders  { background:linear-gradient(135deg,#003070,#0065BD); }
.bg-costco   { background:linear-gradient(135deg,#002855,#005DAA); }
.bg-homeplus { background:linear-gradient(135deg,#003070,#0066CC); }
.bg-everyday { background:linear-gradient(135deg,#a03000,#FF6B35); }
.bg-lotteon  { background:linear-gradient(135deg,#800010,#E40028); }
.bg-toss     { background:linear-gradient(135deg,#002890,#0064FF); }
.bg-eleven   { background:linear-gradient(135deg,#990000,#FF0033); }
.bg-naver       { background:linear-gradient(135deg,#005500,#03C75A); }
.bg-emart_flyer { background:linear-gradient(135deg,#7a5e00,#c89b00); }
.bg-lotte_flyer { background:linear-gradient(135deg,#8b0a1a,#e31837); }

/* No results */
.no-results { text-align:center; padding:50px 20px; color:var(--muted); }
.no-results .icon { font-size:40px; margin-bottom:12px; }
.no-results p { font-size:14px; }

/* Loader */
.loader { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:14px; color:var(--muted); font-size:13px; }
.spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:#a78bfa; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Highlight search match */
mark { background:rgba(167,139,250,.3); color:#fff; border-radius:2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">MarketAI 🛒</span>
    <span class="count" id="count"></span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="search" placeholder="상품명, 카테고리 검색..." autocomplete="off">
    <button class="search-clear" id="clearBtn">✕</button>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-p="naver">네이버쇼핑</button>
    <button class="tab" data-p="emart_flyer">이마트전단</button>
    <button class="tab" data-p="lotte_flyer">롯데마트전단</button>
  </div>
</div>

<div id="content">
  <div class="loader"><div class="spinner"></div><span>식품 할인 정보 수집 중...</span></div>
</div>

<script>
const EMOJI = {
  과일:'🍊', 딸기:'🍓', 채소:'🥦', 육류:'🥩', 닭:'🍗', 수산물:'🐟', 연어:'🐟',
  유제품:'🥛', 달걀:'🥚', 라면:'🍜', 냉동:'🧊', 만두:'🥟', 음료:'🥤',
  커피:'☕', 물:'💧', 베이커리:'🥐', 빵:'🍞', 과자:'🍪', 스낵:'🍿',
  견과류:'🥜', 간편식:'🍱', 통조림:'🥫', 김치:'🥬', 소스:'🍶', 주류:'🍺',
};
const fallback = { kurly:'🟣', coupang:'🟠', ssg:'🔴', emart:'🟡', traders:'🔵', costco:'🔵', homeplus:'🔵', everyday:'🟠', lotteon:'🔴', toss:'🔵', eleven:'🔴', naver:'🟢', lotte:'🔴' };

function getEmoji(item) {
  for(const [k,v] of Object.entries(EMOJI)) {
    if((item.category||'').includes(k)||(item.title||'').includes(k)) return v;
  }
  return fallback[item.platform]||'🏪';
}
function fmt(p){ return p ? p.toLocaleString('ko-KR')+'원' : ''; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlight(text, query) {
  if(!query) return esc(text);
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

function flyerCardHTML(item, idx=0) {
  const loadAttr = idx < 4 ? '' : 'loading="lazy"';
  const imgTag = item.image_url
    ? `<img class="loading" src="${item.image_url}" alt="" ${loadAttr} onload="this.classList.remove('loading')" onerror="this.style.display='none'">`
    : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px">🗂️</div>`;
  return `<a class="card" href="${item.url}" target="_blank" rel="noopener noreferrer">
    <div class="flyer-page-img bg-${item.platform}">${imgTag}</div>
    <div class="card-body">
      <div class="ptag ptag-${item.platform}">${esc(item.platform_name)}</div>
      <div class="card-title">${esc(item.title)}</div>
    </div>
  </a>`;
}

function cardHTML(item, query='', idx=0) {
  const disc  = item.discount_rate && item.discount_rate >= 5 ? `<div class="disc-badge">${item.discount_rate}%↓</div>` : '';
  const badge = item.badge ? `<div class="extra-badge">${esc(item.badge)}</div>` : '';
  const imgSrc = item.image_url || '';
  // 첫 6개는 eager로딩으로 빠르게 표시
  const loadAttr = idx < 6 ? '' : 'loading="lazy"';
  const imgTag = imgSrc
    ? `<img class="loading" src="${imgSrc}" alt="" ${loadAttr} onload="this.classList.remove('loading')" onerror="this.style.display='none'">`
    : `<div class="img-placeholder">${getEmoji(item)}</div>`;
  const price = item.sale_price
    ? `<div class="price-row"><span class="sale-price">${fmt(item.sale_price)}</span>${item.original_price?`<span class="orig-price">${fmt(item.original_price)}</span>`:''}</div>` : '';
  const titleHtml = highlight(item.title, query);

  return `<a class="card" href="${item.url}" target="_blank" rel="noopener noreferrer">
    <div class="card-img bg-${item.platform}">
      ${imgTag}${disc}${badge}
    </div>
    <div class="card-body">
      <div class="ptag ptag-${item.platform}">${esc(item.platform_name)}</div>
      <div class="card-title">${titleHtml}</div>
      ${price}
    </div>
  </a>`;
}

// 전단 플랫폼별 공식 전단 이미지 뷰어 URL (항상 이번 주 전단으로 자동 갱신)
const FLYER_VIEWER = {
  emart_flyer: { name:'이마트 전단', url:'https://emartapp.emart.com/webapp/product/flyer?trcknCode=main_leaflet' },
  lotte_flyer: { name:'롯데마트 전단', url:'https://www.mcouponapp.com/lm/401/?from=app_leaflet' },
};

function flyerBannerHTML(platform) {
  const f = FLYER_VIEWER[platform];
  if (!f) return '';
  return `<a class="flyer-banner" href="${f.url}" target="_blank" rel="noopener noreferrer">
    <span class="flyer-banner-label">📄 ${esc(f.name)} 이미지 전체보기</span>
    <span class="flyer-banner-cta">전단지 보기 →</span>
  </a>`;
}

let allItems = [];
let currentPlatform = 'all';
let searchQuery = '';
let currentController = null;

function render() {
  const q = searchQuery.trim().toLowerCase();
  let items = allItems;
  if(q) {
    items = items.filter(it =>
      it.title.toLowerCase().includes(q) ||
      (it.category||'').toLowerCase().includes(q) ||
      it.platform_name.toLowerCase().includes(q)
    );
  }
  const countEl = document.getElementById('count');
  countEl.textContent = items.length ? `${items.length}개 상품` : '';

  if(!items.length) {
    const banner = FLYER_VIEWER[currentPlatform] ? flyerBannerHTML(currentPlatform) : '';
    document.getElementById('content').innerHTML =
      banner + `<div class="no-results"><div class="icon">🔍</div><p>${q ? `"${esc(q)}" 검색 결과가 없습니다` : '이번주 행사 상품을 불러오는 중입니다'}</p></div>`;
    return;
  }

  const banner = FLYER_VIEWER[currentPlatform] ? flyerBannerHTML(currentPlatform) : '';
  const cards = items.map((it, i) =>
    it.category === '전단지' ? flyerCardHTML(it, i) : cardHTML(it, q, i)
  ).join('');
  document.getElementById('content').innerHTML =
    banner + `<div class="grid">${cards}</div>`;
}

async function loadPlatform(platform) {
  if (currentController) currentController.abort();
  const ctrl = new AbortController();
  currentController = ctrl;
  currentPlatform = platform;
  document.getElementById('content').innerHTML =
    '<div class="loader"><div class="spinner"></div><span>불러오는 중...</span></div>';
  try {
    const r = await fetch(`/api/promotions?platform=${platform}`, { signal: ctrl.signal });
    if (ctrl.signal.aborted) return;
    if(!r.ok) throw new Error();
    const data = await r.json();
    if (ctrl.signal.aborted) return;
    allItems = data.items;
    render();
  } catch(e) {
    if (e.name === 'AbortError') return;
    document.getElementById('content').innerHTML =
      '<div class="no-results"><div class="icon">⚠️</div><p>데이터를 불러올 수 없습니다</p></div>';
  }
}

// Tab events
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('clearBtn').classList.remove('show');
    loadPlatform(t.dataset.p);
  });
});

// Search events
const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

input.addEventListener('input', () => {
  searchQuery = input.value;
  clearBtn.classList.toggle('show', !!input.value);
  render();
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  searchQuery = '';
  clearBtn.classList.remove('show');
  render();
  input.focus();
});

loadPlatform('naver');
</script>
</body>
</html>
