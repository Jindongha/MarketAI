<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>MarketAI - 오늘의 할인</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --lotte: #e31837;
    --coupang: #ff6000;
    --ssg: #c00;
    --kurly: #5f0080;
    --bg: #0f0f1a;
    --surface: #1c1c2e;
    --card: #252538;
    --text: #f0f0f0;
    --muted: #888;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    padding-bottom: 24px;
  }

  /* Header */
  .header {
    background: var(--surface);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #2a2a40;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
    position: sticky;
    top: 60px;
    z-index: 99;
    border-bottom: 1px solid #2a2a40;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid #333;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active { color: #fff; border-color: transparent; }
  .tab[data-platform="all"].active  { background: linear-gradient(135deg, #a78bfa, #60a5fa); }
  .tab[data-platform="lotte"].active  { background: var(--lotte); }
  .tab[data-platform="coupang"].active { background: var(--coupang); }
  .tab[data-platform="ssg"].active    { background: var(--ssg); }
  .tab[data-platform="kurly"].active  { background: var(--kurly); }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 14px 12px;
    max-width: 640px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:active { transform: scale(0.97); }

  .card-image {
    width: 100%;
    aspect-ratio: 1;
    background: #1a1a30;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    position: relative;
  }
  .card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .discount-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #e74c3c;
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 7px;
    border-radius: 6px;
  }

  .extra-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 6px;
    backdrop-filter: blur(4px);
  }

  .card-body {
    padding: 10px 10px 12px;
  }

  .platform-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 5px;
  }
  .tag-lotte   { background: rgba(227,24,55,0.2);  color: #ff6b80; }
  .tag-coupang { background: rgba(255,96,0,0.2);   color: #ff9955; }
  .tag-ssg     { background: rgba(204,0,0,0.2);    color: #ff5555; }
  .tag-kurly   { background: rgba(95,0,128,0.25);  color: #c77dff; }

  .card-title {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.4;
    color: #ddd;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .price-sale {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
  }
  .price-original {
    font-size: 11px;
    color: var(--muted);
    text-decoration: line-through;
  }

  /* Loading */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #333;
    border-top-color: #a78bfa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* Emoji fallback map */
  .emoji-lotte   { background: linear-gradient(135deg, #e31837, #ff6b6b); }
  .emoji-coupang { background: linear-gradient(135deg, #ff6000, #ff9955); }
  .emoji-ssg     { background: linear-gradient(135deg, #cc0000, #ff4444); }
  .emoji-kurly   { background: linear-gradient(135deg, #5f0080, #9b59b6); }
</style>
</head>
<body>

<div class="header">
  <h1>MarketAI</h1>
  <p id="subtitle">할인 정보를 불러오는 중...</p>
</div>

<div class="tabs">
  <button class="tab active" data-platform="all">전체</button>
  <button class="tab" data-platform="lotte">롯데마트</button>
  <button class="tab" data-platform="coupang">쿠팡</button>
  <button class="tab" data-platform="ssg">SSG</button>
  <button class="tab" data-platform="kurly">컬리</button>
</div>

<div id="content">
  <div class="loader">
    <div class="spinner"></div>
    <span>할인 정보 수집 중...</span>
  </div>
</div>

<script>
  const EMOJIS = {
    lotte: '🛒', coupang: '📦', ssg: '🛍', kurly: '🥦',
    과일: '🍊', 육류: '🥩', 냉동식품: '🧊', 음료: '🥤',
    전자기기: '📱', 뷰티: '💄', 생활용품: '🧴', 패션: '👟',
    건강: '💊', 식품: '🍜', 주류: '🍺', 선물세트: '🎁',
    두부: '🫘', 베이커리: '🥐', 주방용품: '☕', 식재료: '🌾',
  };

  function getEmoji(item) {
    for (const [k, v] of Object.entries(EMOJIS)) {
      if (item.category && item.category.includes(k)) return v;
    }
    return EMOJIS[item.platform] || '🏪';
  }

  function formatPrice(p) {
    if (!p) return '';
    return p.toLocaleString('ko-KR') + '원';
  }

  function renderCard(item) {
    const hasImage = item.image_url;
    const imgHtml = hasImage
      ? `<img src="${item.image_url}" alt="${item.title}" loading="lazy" onerror="this.style.display='none'">`
      : '';
    const discountHtml = item.discount_rate
      ? `<div class="discount-badge">${item.discount_rate}%↓</div>` : '';
    const badgeHtml = item.badge
      ? `<div class="extra-badge">${item.badge}</div>` : '';
    const priceHtml = item.sale_price
      ? `<div class="price-row">
          <span class="price-sale">${formatPrice(item.sale_price)}</span>
          ${item.original_price ? `<span class="price-original">${formatPrice(item.original_price)}</span>` : ''}
         </div>` : '';

    return `
      <a class="card" href="${item.url}" target="_blank" rel="noopener">
        <div class="card-image emoji-${item.platform}">
          ${imgHtml}
          <span style="${hasImage ? 'display:none' : ''}">${getEmoji(item)}</span>
          ${discountHtml}
          ${badgeHtml}
        </div>
        <div class="card-body">
          <div class="platform-tag tag-${item.platform}">${item.platform_name}</div>
          <div class="card-title">${item.title}</div>
          ${priceHtml}
        </div>
      </a>`;
  }

  function renderGrid(items) {
    if (!items.length) {
      return '<div class="error-box">표시할 상품이 없습니다.</div>';
    }
    return `<div class="grid">${items.map(renderCard).join('')}</div>`;
  }

  let allItems = [];

  async function loadPromotions(platform = 'all') {
    document.getElementById('content').innerHTML =
      '<div class="loader"><div class="spinner"></div><span>불러오는 중...</span></div>';

    try {
      const res = await fetch(`/api/promotions?platform=${platform}`);
      if (!res.ok) throw new Error('서버 오류');
      const data = await res.json();
      allItems = data.items;
      document.getElementById('subtitle').textContent =
        `총 ${data.total}개 할인 상품`;
      document.getElementById('content').innerHTML = renderGrid(allItems);
    } catch (e) {
      document.getElementById('content').innerHTML =
        '<div class="error-box">데이터를 불러올 수 없습니다.<br>잠시 후 다시 시도해 주세요.</div>';
      document.getElementById('subtitle').textContent = '오류 발생';
    }
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      loadPromotions(tab.dataset.platform);
    });
  });

  loadPromotions('all');
</script>
</body>
</html>
